services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-agrosense_dev}
      MYSQL_DATABASE: agrosense
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-agrosense_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./agrosense-backend
    ports:
      - "8001:8001"
    env_file: ./agrosense-backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "python migrate_db.py && uvicorn app:app --host 0.0.0.0 --port 8001 --reload"

  frontend:
    build: ./agrosense-frontend
    ports:
      - "3000:3000"
    env_file: ./agrosense-frontend/.env
    depends_on:
      - backend

volumes:
  mysql_data:
